name: Auto-sync marketing data

# Pulls Google Ads, Google Search Console, and Meta+Instagram metrics into
# Supabase twice daily — morning + evening Israel time — so the dashboard
# and the marketing-advisor agents always see fresh conversions,
# impressions, and follower counts.
#
# Why twice daily and not more often:
#   - Google Search Console has a 2-3 day lag by design; syncing more often
#     is wasted API calls.
#   - Google Ads + Meta update hourly but decisions happen on daily rolls.
#   - The advisor agents fire their own Serper research on-demand when you
#     click "Run advisor" — that's independent of this cron.
#
# If you ever need intraday sync (e.g. mid-day bid tuning), add another
# cron line or click "Run workflow" manually.
#
# Manual trigger button: Actions → Auto-sync marketing data → Run workflow.
#
# Required GitHub Secrets:
#   SUPABASE_URL                 https://ytydgldyeygpzmlxvpvb.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY    eyJ... (JWT format, NOT sb_secret_*)

on:
  # Schedule disabled — the sync functions kept hitting Supabase's
  # WORKER_RESOURCE_LIMIT and failing on every run, which flooded the owner
  # with failure emails. Manual dispatch remains so the workflow can still
  # be fired on demand from Actions → Auto-sync marketing data → Run workflow.
  # Re-enable by uncommenting the schedule block once the resource issue is
  # resolved (likely needs edge function memory tuning or splitting the sync
  # into smaller per-source runs).
  # schedule:
  #   - cron: '0 4,18 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false  # one failed source shouldn't block the others
      matrix:
        function:
          # google-sync, meta-sync, woo-orders-sync disabled — they hit paid APIs
          # (Google Ads API quota, Meta Graph insights, WooCommerce host bandwidth)
          # and the owner prefers to trigger them manually from the dashboard.
          # Re-enable by adding them back to this list.
          - google-search-sync   # Google Search Console — free, keep on cron
          - rfm-sync             # Customer RFM segmentation — local compute, free
    steps:
      - name: Trigger ${{ matrix.function }}
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/${{ matrix.function }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"trigger":"github-actions-cron"}')
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::${{ matrix.function }} failed with HTTP $status"
            exit 1
          fi
