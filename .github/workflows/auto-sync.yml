name: Auto-sync marketing data

# Pulls Google Ads, Google Search Console, and Meta+Instagram metrics into
# Supabase every 6 hours so the dashboard and the marketing-advisor agents
# always see fresh conversions, impressions, and follower counts.
#
# Manual trigger button: Actions → Auto-sync marketing data → Run workflow.
#
# Required GitHub Secrets:
#   SUPABASE_URL                 https://ytydgldyeygpzmlxvpvb.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY    eyJ... (JWT format, NOT sb_secret_*)

on:
  schedule:
    # 00:00, 06:00, 12:00, 18:00 UTC  (03/09/15/21 Israel)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false  # one failed source shouldn't block the others
      matrix:
        function:
          - google-sync          # Google Ads — campaigns, ads, keywords, conversions
          - google-search-sync   # Google Search Console — queries, clicks, impressions
          - meta-sync            # Meta Ads + Instagram organic
    steps:
      - name: Trigger ${{ matrix.function }}
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/${{ matrix.function }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"trigger":"github-actions-cron"}')
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::${{ matrix.function }} failed with HTTP $status"
            exit 1
          fi
