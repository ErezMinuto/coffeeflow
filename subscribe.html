<!DOCTYPE html>
<!--
  Newsletter subscription landing page for the first_purchase_invite
  automation. Customer arrives here from the post-purchase invitation
  email with their email pre-filled in the URL:

      /subscribe?email=user%40example.com

  Submits to api.minuto.co.il/forms-submit, which:
    • adds them to marketing_contacts
    • pushes to Resend audience
    • creates a 10% WC coupon
    • sends the welcome email with the coupon code

  On success → redirects to /subscribed.html.
  On error → shows inline message, stays on this page.

  Standalone HTML — no WP plugin/theme dependency. Upload via FTP to
  web root. Dev can replace with a proper WP page later that inherits
  the site header/footer.
-->
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>הצטרפות לרשימת הדיוור | מינוטו</title>
  <link rel="icon" href="https://www.minuto.co.il/content/uploads/2025/03/Frame-14.png" type="image/png">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Heebo', Arial, sans-serif;
      background: #f6f3ee;
      margin: 0;
      padding: 40px 20px;
      color: #2a2a2a;
      min-height: 100vh;
    }
    .wrap {
      max-width: 480px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(61, 74, 46, 0.08);
    }
    .header {
      background: linear-gradient(160deg, #3D4A2E 0%, #6A7D45 100%);
      padding: 32px 32px 28px;
      text-align: center;
      color: white;
    }
    .header img {
      max-height: 56px;
      width: auto;
      margin-bottom: 12px;
    }
    .header h1 {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 700;
    }
    .header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.9;
    }
    .body {
      padding: 28px 32px 32px;
    }
    .pitch {
      background: #f6f3ee;
      border: 2px dashed #6A7D45;
      border-radius: 12px;
      padding: 18px 20px;
      text-align: center;
      margin-bottom: 24px;
    }
    .pitch strong {
      display: block;
      font-size: 17px;
      color: #3D4A2E;
      margin-bottom: 6px;
    }
    .pitch span {
      font-size: 13px;
      color: #6a6a6a;
    }
    label {
      display: block;
      font-size: 14px;
      color: #4a4a4a;
      margin: 14px 0 6px;
      font-weight: 500;
    }
    input[type=email], input[type=text] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d4cfc4;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      background: white;
      transition: border-color 0.15s;
    }
    input[type=email]:focus, input[type=text]:focus {
      outline: none;
      border-color: #6A7D45;
    }
    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 18px 0 4px;
    }
    .checkbox-row input {
      margin-top: 3px;
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      accent-color: #6A7D45;
    }
    .checkbox-row label {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: #555;
      cursor: pointer;
    }
    .checkbox-row a {
      color: #6A7D45;
      text-decoration: underline;
    }
    button {
      width: 100%;
      background: #6A7D45;
      color: white;
      padding: 14px 20px;
      border: 0;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      font-family: inherit;
      transition: background 0.15s;
    }
    button:hover { background: #3D4A2E; }
    button:disabled {
      background: #b8b8b8;
      cursor: not-allowed;
    }
    .error {
      background: #FEE2E2;
      color: #991B1B;
      padding: 12px 14px;
      border-radius: 8px;
      margin-top: 16px;
      font-size: 14px;
      display: none;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #8a8a8a;
      line-height: 1.6;
    }
    .footer a { color: #6A7D45; text-decoration: none; }
    /* Honeypot — hidden from humans, bots fill it */
    .honeypot {
      position: absolute;
      left: -9999px;
      opacity: 0;
      pointer-events: none;
      height: 0;
      width: 0;
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <img src="https://www.minuto.co.il/content/uploads/2025/03/Frame-14.png" alt="Minuto Cafe">
    <h1>הצטרפות לרשימת הדיוור ☕</h1>
    <p>בית קלייה ספשלטי, רחובות</p>
  </div>

  <div class="body">
    <div class="pitch">
      <strong>10% הנחה על הזמנה ראשונה</strong>
      <span>פולי קפה ספשלטי · שימוש חד-פעמי · תקף 60 יום</span>
    </div>

    <form id="subscribe-form" novalidate>
      <label for="email">כתובת המייל שלך</label>
      <input type="email" id="email" name="email" required autocomplete="email" />

      <label for="name">שם פרטי <span style="color:#999;font-weight:400">(אופציונלי)</span></label>
      <input type="text" id="name" name="name" autocomplete="given-name" />

      <div class="checkbox-row">
        <input type="checkbox" id="consent" name="consent" required />
        <label for="consent">
          אני מאשר/ת קבלת מיילים שיווקיים ועדכונים ממינוטו קפה.
          ניתן להסיר בכל עת באמצעות קישור הסרה בכל מייל.
          <a href="https://www.minuto.co.il/privacy-policy/" target="_blank" rel="noopener">מדיניות פרטיות</a>
        </label>
      </div>

      <input type="text" name="website" autocomplete="off" tabindex="-1" class="honeypot" aria-hidden="true" />

      <button type="submit" id="submit-btn">להצטרפות וקבלת קוד 10%</button>

      <div class="error" id="error-msg"></div>
    </form>

    <div class="footer">
      ©&nbsp;מינוטו קפה בע"מ · אחד העם 22, רחובות<br>
      <a href="https://www.minuto.co.il">minuto.co.il</a> · <a href="mailto:info@minuto.co.il">info@minuto.co.il</a>
    </div>
  </div>
</div>

<script>
(function() {
  var ENDPOINT = 'https://api.minuto.co.il/forms-submit';
  var form = document.getElementById('subscribe-form');
  var emailEl = document.getElementById('email');
  var nameEl = document.getElementById('name');
  var consentEl = document.getElementById('consent');
  var btn = document.getElementById('submit-btn');
  var errEl = document.getElementById('error-msg');

  // Pre-fill email from ?email=... query string. Customer arrives here
  // from the invitation email with their address already in the URL,
  // so make the form one-click on the happy path. Field stays editable
  // in case they want to use a different address.
  //
  // ?src=... is the attribution tag — same page can be linked from
  // multiple campaigns (invite email, homepage CTA, instagram bio,
  // QR code at the cafe). The src value gets forwarded to the API
  // and ends up in marketing_contacts.source, so we can measure
  // conversion per channel. Whitelist matches the API's regex.
  var srcParam = '';
  try {
    var params = new URLSearchParams(window.location.search);
    var prefill = params.get('email');
    if (prefill) emailEl.value = prefill.trim();
    var rawSrc = (params.get('src') || '').trim();
    if (/^[a-z0-9_-]{1,40}$/.test(rawSrc)) srcParam = rawSrc;
  } catch (e) { /* old browser, no biggie */ }

  function showError(msg) {
    errEl.textContent = msg;
    errEl.style.display = 'block';
  }

  function clearError() {
    errEl.textContent = '';
    errEl.style.display = 'none';
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    clearError();

    var email = (emailEl.value || '').trim().toLowerCase();
    var name = (nameEl.value || '').trim();
    var consent = consentEl.checked;
    var honeypot = (form.elements.website.value || '').trim();

    if (!email) {
      showError('יש להזין כתובת מייל.');
      emailEl.focus();
      return;
    }
    if (!consent) {
      showError('יש לאשר קבלת מיילים שיווקיים כדי להמשיך.');
      consentEl.focus();
      return;
    }

    btn.disabled = true;
    btn.textContent = 'שולח…';

    var payload = {
      type: 'newsletter',
      email: email,
      consent: true,
      website: honeypot
    };
    if (name) payload.name = name;
    if (srcParam) payload.source = srcParam;

    try {
      var res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      var data = null;
      try { data = await res.json(); } catch (_) {}

      if (res.ok && data && data.ok) {
        // Carry the email to the thank-you page so it can show
        // "we sent the coupon to <email>" — better UX than generic.
        window.location.href = '/subscribed.html?email=' + encodeURIComponent(email);
        return;
      }

      var srvErr = (data && data.error) || ('שגיאה (HTTP ' + res.status + ')');
      // Translate the most common API errors to Hebrew
      if (/invalid email/i.test(srvErr)) srvErr = 'כתובת המייל לא תקינה.';
      else if (/consent/i.test(srvErr)) srvErr = 'יש לאשר קבלת מיילים שיווקיים.';
      else if (/honeypot|spam/i.test(srvErr)) srvErr = 'נחסם כחשוד בספאם. נסה/י שוב.';
      showError(srvErr);
    } catch (e) {
      showError('שגיאת רשת. נסה/י שוב, או פנה/י אלינו ב-info@minuto.co.il');
    } finally {
      btn.disabled = false;
      btn.textContent = 'להצטרפות וקבלת קוד 10%';
    }
  });
})();
</script>

</body>
</html>
