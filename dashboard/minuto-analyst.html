<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minuto · AI Analyst</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1208;
    --cream: #f7f2ea;
    --espresso: #2c1a0e;
    --roast: #6b3a1f;
    --gold: #c8923a;
    --light: #ede5d8;
    --muted: #9b8778;
    --card: #ffffff;
    --border: #e4d8c8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--espresso);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--gold);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    color: var(--cream);
    font-size: 1.4rem;
    letter-spacing: 0.02em;
  }

  .logo span { color: var(--gold); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    display: inline-block;
    margin-left: 8px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-label { color: var(--muted); font-size: 0.75rem; display: flex; align-items: center; gap: 6px; }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 0;
    max-height: calc(100vh - 65px);
  }

  /* Sidebar */
  .sidebar {
    background: var(--espresso);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    border-left: 1px solid rgba(255,255,255,0.08);
  }

  .sidebar-title {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .quick-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--cream);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    text-align: right;
    transition: all 0.2s;
    line-height: 1.4;
  }

  .quick-btn:hover {
    background: rgba(200,146,58,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  .data-preview {
    margin-top: 12px;
    padding: 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .data-preview-title {
    color: var(--muted);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--muted); font-size: 0.75rem; }
  .stat-val { color: var(--cream); font-size: 0.85rem; font-weight: 500; }

  /* Chat area */
  .chat-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .message {
    max-width: 80%;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-start; }
  .message.assistant { align-self: flex-end; }

  .bubble {
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 0.9rem;
    line-height: 1.6;
  }

  .message.user .bubble {
    background: var(--espresso);
    color: var(--cream);
    border-bottom-right-radius: 4px;
  }

  .message.assistant .bubble {
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .message.assistant .bubble h3 {
    font-family: 'Playfair Display', serif;
    color: var(--roast);
    margin: 12px 0 6px;
    font-size: 1rem;
  }

  .message.assistant .bubble h3:first-child { margin-top: 0; }

  .message.assistant .bubble ul {
    padding-right: 18px;
    margin: 6px 0;
  }

  .message.assistant .bubble li { margin: 4px 0; }

  .message.assistant .bubble strong { color: var(--roast); }

  .message.assistant .bubble p { margin: 6px 0; }
  .message.assistant .bubble p:first-child { margin-top: 0; }
  .message.assistant .bubble p:last-child { margin-bottom: 0; }

  .sender {
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 5px;
    padding: 0 4px;
  }

  .message.user .sender { text-align: right; }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 14px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
    align-self: flex-end;
  }

  .typing-dot {
    width: 7px; height: 7px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input */
  .input-area {
    padding: 16px 24px 20px;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    background: var(--cream);
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  textarea:focus { border-color: var(--gold); }

  textarea::placeholder { color: var(--muted); }

  .send-btn {
    background: var(--espresso);
    color: var(--cream);
    border: none;
    border-radius: 12px;
    width: 48px;
    height: 48px;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--roast); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .welcome h2 {
    font-family: 'Playfair Display', serif;
    color: var(--espresso);
    font-size: 1.6rem;
    margin-bottom: 8px;
  }

  .welcome p { font-size: 0.9rem; line-height: 1.6; }

  .coffee-icon { font-size: 2.5rem; margin-bottom: 12px; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">Minuto <span>✦</span> AI Analyst</div>
  <div class="status-label">
    <span class="status-dot"></span>
    מחובר לנתונים בזמן אמת
  </div>
</header>

<main>
  <div class="sidebar">
    <div class="sidebar-title">שאלות מהירות</div>

    <button class="quick-btn" onclick="quickAsk('אילו פוסטים ביצעו הכי טוב החודש? ומה המשותף ביניהם?')">
      🏆 הפוסטים המובילים החודש
    </button>
    <button class="quick-btn" onclick="quickAsk('מה ההבדל בין הביצועים של ריילס לפוסטים רגילים אצלנו?')">
      🎬 ריילס vs. פוסטים — מה עובד יותר?
    </button>
    <button class="quick-btn" onclick="quickAsk('איך המעורבות שלנו השתנתה לאורך הזמן? יש מגמה?')">
      📈 מגמות מעורבות לאורך זמן
    </button>
    <button class="quick-btn" onclick="quickAsk('תן לי 5 רעיונות קונקרטיים לתוכן בהתבסס על מה שעבד אצלנו, עם הסבר קצר לכל אחד')">
      💡 רעיונות תוכן מותאמים אישית
    </button>
    <button class="quick-btn" onclick="quickAsk('איזה קמפיין ממומן הייתי ממליץ להריץ כרגע על בסיס הפוסטים האורגניים הטובים ביותר?')">
      📣 מה כדאי לקדם בתשלום?
    </button>
    <button class="quick-btn" onclick="quickAsk('מה שעות ויום הפרסום האופטימליים עבורנו על בסיס הנתונים?')">
      🕐 מתי כדאי לפרסם?
    </button>
    <button class="quick-btn" onclick="quickAsk('תנתח את הביצועים שלנו ותן לי דוח מנהלים קצר עם 3 נקודות חוזק ו-3 תחומי שיפור')">
      📋 דוח מנהלים מלא
    </button>

    <div class="data-preview" id="dataPreview">
      <div class="data-preview-title">נתונים טעונים</div>
      <div class="stat-row">
        <span class="stat-label">פוסטים</span>
        <span class="stat-val" id="statPosts">טוען...</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">ריילס</span>
        <span class="stat-val" id="statReels">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">סה״כ לייקים</span>
        <span class="stat-val" id="statLikes">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">סה״כ תגובות</span>
        <span class="stat-val" id="statComments">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">מעורבות ממוצעת</span>
        <span class="stat-val" id="statAvgEng">—</span>
      </div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="coffee-icon">☕</div>
        <h2>שלום, ארז</h2>
        <p>אני מנתח את נתוני האינסטגרם של Minuto בזמן אמת.<br>שאל אותי כל שאלה על הביצועים שלך.</p>
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="userInput"
        placeholder="שאל אותי על הביצועים שלך..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://xfxbonvysrkthrkhmwqq.supabase.co'
const SUPABASE_KEY = 'sb_publishable_x-PQ1XjQAgn9q8pFLavkeQ_TMgFU6PT'

let postsData = []
let conversationHistory = []

async function fetchSupabase(table, query = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
    }
  })
  return res.json()
}

async function loadData() {
  try {
    postsData = await fetchSupabase('meta_organic_posts', 'order=created_at.desc&limit=100')
    
    const reels = postsData.filter(p => p.post_type === 'reel')
    const totalLikes = postsData.reduce((s, p) => s + p.likes, 0)
    const totalComments = postsData.reduce((s, p) => s + p.comments, 0)
    const totalEng = totalLikes + totalComments + postsData.reduce((s, p) => s + p.shares + p.saves, 0)
    const avgEng = postsData.length > 0 ? (totalEng / postsData.length).toFixed(1) : 0

    document.getElementById('statPosts').textContent = postsData.length
    document.getElementById('statReels').textContent = reels.length
    document.getElementById('statLikes').textContent = totalLikes.toLocaleString()
    document.getElementById('statComments').textContent = totalComments.toLocaleString()
    document.getElementById('statAvgEng').textContent = avgEng
  } catch (e) {
    document.getElementById('statPosts').textContent = 'שגיאה'
  }
}

function buildDataContext() {
  if (!postsData.length) return 'אין נתונים זמינים.'

  const sorted = [...postsData].sort((a, b) => (b.likes + b.comments) - (a.likes + a.comments))
  const top10 = sorted.slice(0, 10)
  const reels = postsData.filter(p => p.post_type === 'reel')
  const posts = postsData.filter(p => p.post_type === 'post')

  const avgEngReels = reels.length > 0
    ? (reels.reduce((s, p) => s + p.likes + p.comments, 0) / reels.length).toFixed(1)
    : 0
  const avgEngPosts = posts.length > 0
    ? (posts.reduce((s, p) => s + p.likes + p.comments, 0) / posts.length).toFixed(1)
    : 0

  const postsSummary = postsData.map(p => ({
    type: p.post_type,
    date: p.created_at?.slice(0, 10),
    likes: p.likes,
    comments: p.comments,
    shares: p.shares,
    saves: p.saves,
    caption: p.message ? p.message.slice(0, 120) : null,
    dayOfWeek: p.created_at ? new Date(p.created_at).toLocaleDateString('he-IL', { weekday: 'long' }) : null,
    hour: p.created_at ? new Date(p.created_at).getHours() : null,
  }))

  return `
נתוני Instagram אורגני של Minuto Coffee (בית קפה ספשיאלטי ברחובות, ישראל):

סיכום כללי:
- נתונים מעודכנים עד: ${postsData[0]?.created_at?.slice(0,10) || 'לא ידוע'} (הפוסט האחרון)
- סה"כ פוסטים: ${postsData.length} (${reels.length} ריילס, ${posts.length} פוסטים רגילים)
- מעורבות ממוצעת ריילס: ${avgEngReels}
- מעורבות ממוצעת פוסטים: ${avgEngPosts}
- סה"כ לייקים: ${postsData.reduce((s, p) => s + p.likes, 0)}
- סה"כ תגובות: ${postsData.reduce((s, p) => s + p.comments, 0)}

10 הפוסטים המובילים:
${top10.map((p, i) => `${i+1}. [${p.post_type}] ${p.created_at?.slice(0,10)} | לייקים: ${p.likes} | תגובות: ${p.comments} | "${p.message?.slice(0,80) || 'ללא כיתוב'}"`).join('\n')}

כל הפוסטים (לניתוח מגמות):
${JSON.stringify(postsSummary, null, 2)}
`
}

async function sendMessage(customMsg) {
  const input = document.getElementById('userInput')
  const msg = customMsg || input.value.trim()
  if (!msg) return

  if (!customMsg) input.value = ''
  input.style.height = 'auto'

  // Remove welcome screen
  const welcome = document.querySelector('.welcome')
  if (welcome) welcome.remove()

  addMessage('user', msg)
  conversationHistory.push({ role: 'user', content: msg })

  const sendBtn = document.getElementById('sendBtn')
  sendBtn.disabled = true
  showTyping()

  try {
    const dataContext = buildDataContext()

    const systemPrompt = `אתה אנליסט שיווק דיגיטלי מומחה לעסקי קפה ומסעדנות, עם גישה לנתוני האינסטגרם האמיתיים של Minuto Coffee.

${dataContext}

הנחיות:
- ענה בעברית תמיד
- היה ספציפי — הזכר מספרים ותאריכים מהנתונים
- תן המלצות קונקרטיות ומעשיות
- הבן את הקהל הישראלי ותרבות הקפה המקומית
- כשמדבר על תוכן — חשוב במונחים של specialty coffee, בית קפה שכונתי, חוויה
- היה תמציתי אך מעמיק`

    const messages = [
      ...conversationHistory.slice(-8),
    ]

    const res = await fetch('https://xfxbonvysrkthrkhmwqq.supabase.co/functions/v1/ai-analyst', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
      },
      body: JSON.stringify({ messages, systemPrompt })
    })

    const data = await res.json()
    const reply = data.content?.[0]?.text || 'שגיאה בקבלת תשובה'

    removeTyping()
    addMessage('assistant', reply)
    conversationHistory.push({ role: 'assistant', content: reply })

  } catch (e) {
    removeTyping()
    addMessage('assistant', 'שגיאה בתקשורת עם הAPI. נסה שוב.')
  }

  sendBtn.disabled = false
}

function quickAsk(q) {
  sendMessage(q)
}

function addMessage(role, text) {
  const messages = document.getElementById('messages')

  const div = document.createElement('div')
  div.className = `message ${role}`

  const sender = document.createElement('div')
  sender.className = 'sender'
  sender.textContent = role === 'user' ? 'אתה' : 'AI Analyst'

  const bubble = document.createElement('div')
  bubble.className = 'bubble'

  if (role === 'assistant') {
    bubble.innerHTML = marked.parse(text)
  } else {
    bubble.textContent = text
  }

  div.appendChild(sender)
  div.appendChild(bubble)
  messages.appendChild(div)
  messages.scrollTop = messages.scrollHeight
}

function showTyping() {
  const messages = document.getElementById('messages')
  const div = document.createElement('div')
  div.id = 'typing'
  div.className = 'typing-indicator'
  div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>'
  messages.appendChild(div)
  messages.scrollTop = messages.scrollHeight
}

function removeTyping() {
  document.getElementById('typing')?.remove()
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    sendMessage()
  }
}

function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 120) + 'px'
}

loadData()
</script>
</body>
</html>
